name: 'ldali'
version: '0.1.0'
config-version: 2

profile: 'ldali'

model-paths: ["models"]
seed-paths: ["seeds"]
test-paths: ["tests"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  ldali:
    staging:
      +schema: staging
      +materialized: view
    marts:
      +schema: mart
      +materialized: table
